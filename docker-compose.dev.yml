services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: captcha
      POSTGRES_USER: captcha
      POSTGRES_PASSWORD: captcha
    ports:
      - "5432:5432"
    volumes:
      - captcha-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  captcha-postgres:
