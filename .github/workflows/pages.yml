name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build frontend bundle
        env:
          CAPTCHA_API_BASE: ${{ vars.CAPTCHA_API_BASE }}
        run: |
          set -euo pipefail
          pages_base="/${GITHUB_REPOSITORY#*/}/"
          api_base="${CAPTCHA_API_BASE:-https://154.219.103.114.nip.io}"
          rm -rf pages
          mkdir -p pages

          VITE_API_BASE="$api_base" VITE_BASE_PATH="$pages_base" npm run build:runtime
          cp -R web/runtime/dist/. pages/
          cp pages/index.html pages/404.html

          VITE_API_BASE="$api_base" VITE_BASE_PATH="${pages_base}admin/" npm run build:admin
          mkdir -p pages/admin
          cp -R web/admin/dist/. pages/admin/

          VITE_RUNTIME_URL="$pages_base" VITE_BASE_PATH="${pages_base}collector/" npm run build:collector
          mkdir -p pages/collector
          cp -R web/collector/dist/. pages/collector/

          touch pages/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
