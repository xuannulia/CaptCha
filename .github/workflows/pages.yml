name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build frontend bundle
        env:
          CAPTCHA_API_BASE: ${{ vars.CAPTCHA_API_BASE }}
        run: |
          set -euo pipefail
          pages_base="/${GITHUB_REPOSITORY#*/}/"
          api_base="${CAPTCHA_API_BASE:-https://api.metool.tech/captcha}"
          curl -fsS --retry 3 --retry-delay 2 --max-time 10 "$api_base/healthz" >/dev/null
          rm -rf pages
          mkdir -p pages

          VITE_API_BASE="$api_base" VITE_BASE_PATH="$pages_base" npm run build:runtime
          cp -R web/runtime/dist/. pages/
          for route in demo collect challenge; do
            mkdir -p "pages/$route"
            cp pages/index.html "pages/$route/index.html"
          done
          cp pages/index.html pages/404.html

          touch pages/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
